APP_NAME: orchestrator-service
APP_VERSION: 0.3.0
APP_PORT: 8010
API_PREFIX: /api/v1
LOG_LEVEL: INFO
DEFAULT_TIMEZONE: Asia/Shanghai
DEFAULT_LANGUAGE: zh-CN
REQUEST_TIMEOUT_MS: 30000
SSE_HEARTBEAT_INTERVAL: 15
MAX_HISTORY_TURNS: 20
MAX_HANDOFF_STEPS: 3
MAX_TOOL_CALLS_PER_AGENT: 5
DEFAULT_AGENT_TIMEOUT_SECONDS: 90
MCP_GATEWAY_URL: http://localhost:8020
TOOL_HUB_TRANSPORT: http
ALLOWED_INTERNAL_CALLERS: gateway-service
TOOL_QUERY_CACHE_ENABLED: true
TOOL_QUERY_CACHE_TTL_CAP_SECONDS: 300
SSE_EVENT_TTL_SECONDS: 86400
SMARTCLOUD_MYSQL_DSN: mysql://smartcloud:smartcloud@localhost:3306/smartcloud_x
SMARTCLOUD_REDIS_URL: redis://localhost:6379/0
ORCHESTRATOR_REDIS_NAMESPACE: smartcloud:orchestrator
BUSINESS_TOOLS_REDIS_NAMESPACE: smartcloud:business-tools
RESPONSE_REVIEW_ENABLED: true
REVIEW_REASONING_SUMMARY_MAX_CHARS: 200
REVIEW_FINAL_ANSWER_MAX_CHARS: 800
REVIEW_REQUIRE_CITATIONS_WHEN_RETRIEVAL: true
