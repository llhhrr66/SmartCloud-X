      SMARTCLOUD_MINIO_BUCKET: ${SMARTCLOUD_MINIO_BUCKET:-knowledge-raw}
      SMARTCLOUD_MINIO_ACCESS_KEY: ${SMARTCLOUD_MINIO_ACCESS_KEY:-smartcloud}
      SMARTCLOUD_MINIO_SECRET_KEY: ${SMARTCLOUD_MINIO_SECRET_KEY:-smartcloud123}
      SMARTCLOUD_MYSQL_DSN: ${SMARTCLOUD_MYSQL_DSN:-mysql+pymysql://smartcloud:smartcloud@mysql:3306/smartcloud}
      SMARTCLOUD_QDRANT_URL: ${SMARTCLOUD_QDRANT_URL:-http://qdrant:6333}
      SMARTCLOUD_QDRANT_COLLECTION: ${SMARTCLOUD_QDRANT_COLLECTION:-knowledge_chunks}
      SMARTCLOUD_QDRANT_VECTOR_SIZE: ${SMARTCLOUD_QDRANT_VECTOR_SIZE:-32}
      SMARTCLOUD_OPENSEARCH_URL: ${SMARTCLOUD_OPENSEARCH_URL:-http://opensearch:9200}
      SMARTCLOUD_REDIS_URL: ${SMARTCLOUD_REDIS_URL:-redis://redis:6379/0}
      SMARTCLOUD_EMBEDDING_PROVIDER: ${SMARTCLOUD_EMBEDDING_PROVIDER:-hash-baseline}
      SMARTCLOUD_EMBEDDING_API_URL: ${SMARTCLOUD_EMBEDDING_API_URL:-}
      SMARTCLOUD_EMBEDDING_API_KEY: ${SMARTCLOUD_EMBEDDING_API_KEY:-}
      SMARTCLOUD_EMBEDDING_MODEL: ${SMARTCLOUD_EMBEDDING_MODEL:-}
      SMARTCLOUD_CONNECTOR_TIMEOUT_MS: ${SMARTCLOUD_CONNECTOR_TIMEOUT_MS:-5000}
      SMARTCLOUD_INDEX_WORKER_POLL_SECONDS: ${SMARTCLOUD_INDEX_WORKER_POLL_SECONDS:-2}
      SMARTCLOUD_INDEX_WORKER_BATCH_SIZE: ${SMARTCLOUD_INDEX_WORKER_BATCH_SIZE:-10}
      SMARTCLOUD_PHOENIX_COLLECTOR_ENDPOINT: ${SMARTCLOUD_PHOENIX_COLLECTOR_ENDPOINT:-http://phoenix:4317}
      OTEL_SERVICE_NAME: smartcloud-x-knowledge-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://phoenix:4317}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-grpc}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-smartcloud-x-local}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
    depends_on:
      knowledge-service:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - knowledge_runtime:/app/runtime
      - ../../apps/knowledge-service/data/imports:/app/imports:ro
    restart: unless-stopped

  rag-service:
    build:
      context: ../../apps/rag-service
      dockerfile: Dockerfile
    environment:
      SMARTCLOUD_LOG_LEVEL: ${SMARTCLOUD_LOG_LEVEL:-INFO}
      SMARTCLOUD_TRACE_ENABLED: ${SMARTCLOUD_TRACE_ENABLED:-true}
      SMARTCLOUD_CORS_ALLOWED_ORIGINS: ${SMARTCLOUD_CORS_ALLOWED_ORIGINS:-http://localhost:8050,http://127.0.0.1:8050,http://localhost:5173,http://127.0.0.1:5173}
      SMARTCLOUD_REQUEST_TIMEOUT_MS: ${SMARTCLOUD_REQUEST_TIMEOUT_MS:-10000}
      SMARTCLOUD_REDIS_URL: ${SMARTCLOUD_RAG_REDIS_URL:-redis://redis:6379/1}
      SMARTCLOUD_RAG_CACHE_ENABLED: ${SMARTCLOUD_RAG_CACHE_ENABLED:-true}
      KNOWLEDGE_SERVICE_BASE_URL: ${KNOWLEDGE_SERVICE_BASE_URL:-http://knowledge-service:8030}
      SMARTCLOUD_PHOENIX_COLLECTOR_ENDPOINT: ${SMARTCLOUD_PHOENIX_COLLECTOR_ENDPOINT:-http://phoenix:4317}
      OTEL_SERVICE_NAME: smartcloud-x-rag-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://phoenix:4317}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-grpc}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-smartcloud-x-local}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
    ports:
      - "8040:8040"
    depends_on:
      knowledge-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json, urllib.request; payload=json.load(urllib.request.urlopen('http://127.0.0.1:8040/readyz')); raise SystemExit(0 if payload.get('status') == 'ready' else 1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  gateway-service:
    build:
      context: ../../apps/gateway-service
      dockerfile: Dockerfile
    environment:
      SMARTCLOUD_LOG_LEVEL: ${SMARTCLOUD_LOG_LEVEL:-INFO}
      SMARTCLOUD_CORS_ALLOWED_ORIGINS: ${SMARTCLOUD_CORS_ALLOWED_ORIGINS:-http://localhost:8050,http://127.0.0.1:8050,http://localhost:5173,http://127.0.0.1:5173,http://localhost:3100,http://127.0.0.1:3100}
      SMARTCLOUD_REQUEST_TIMEOUT_MS: ${SMARTCLOUD_REQUEST_TIMEOUT_MS:-10000}
      SMARTCLOUD_JWT_SECRET: ${SMARTCLOUD_JWT_SECRET:-replace-me}
      AUTH_USER_SERVICE_BASE_URL: ${AUTH_USER_SERVICE_BASE_URL:-http://auth-user-service:8001}
      MARKETING_SERVICE_BASE_URL: ${MARKETING_SERVICE_BASE_URL:-http://marketing-service:8002}
      RESEARCH_SERVICE_BASE_URL: ${RESEARCH_SERVICE_BASE_URL:-http://research-service:8003}
      ORCHESTRATOR_SERVICE_BASE_URL: ${ORCHESTRATOR_SERVICE_BASE_URL:-http://orchestrator-service:8010}
      TOOL_HUB_SERVICE_BASE_URL: ${TOOL_HUB_SERVICE_BASE_URL:-http://tool-hub-service:8020}
      BUSINESS_TOOLS_SERVICE_BASE_URL: ${BUSINESS_TOOLS_SERVICE_BASE_URL:-http://business-tools-service:8030}
      KNOWLEDGE_SERVICE_BASE_URL: ${KNOWLEDGE_SERVICE_BASE_URL:-http://knowledge-service:8030}
      RAG_SERVICE_BASE_URL: ${RAG_SERVICE_BASE_URL:-http://rag-service:8040}
      GATEWAY_STORE_PATH: ${GATEWAY_STORE_PATH:-/app/runtime/gateway-store.json}
    ports:
      - "8000:8000"
    volumes:
      - gateway_runtime:/app/runtime
    depends_on:
      auth-user-service:
        condition: service_healthy
      marketing-service:
        condition: service_healthy
      research-service:
        condition: service_healthy
      orchestrator-service:
        condition: service_healthy
      tool-hub-service:
        condition: service_healthy
      business-tools-service:
        condition: service_healthy
      knowledge-service:
        condition: service_healthy
      rag-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import json, urllib.request; payload=json.load(urllib.request.urlopen('http://127.0.0.1:8000/readyz')); raise SystemExit(0 if payload.get('data', {}).get('status') == 'ready' else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web-user:
    build:
      context: ../../
      dockerfile: apps/web-user/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
        VITE_USE_MOCK_API: ${VITE_USE_MOCK_API:-false}
        VITE_APP_TITLE: ${VITE_APP_TITLE:-SmartCloud-X User Console}
        VITE_APP_VERSION: ${VITE_APP_VERSION:-0.1.0}
    ports:
      - "3100:80"
    depends_on:
      gateway-service:
        condition: service_healthy
    restart: unless-stopped

  web-admin:
    build:
      context: ../../
      dockerfile: apps/web-admin/Dockerfile
      args:
        VITE_KNOWLEDGE_SERVICE_BASE_URL: ${VITE_KNOWLEDGE_SERVICE_BASE_URL:-http://localhost:8031/api/knowledge/v1}
        VITE_RAG_SERVICE_BASE_URL: ${VITE_RAG_SERVICE_BASE_URL:-http://localhost:8040/api/rag/v1}
        VITE_OPERATOR_REASON_HEADER: ${VITE_OPERATOR_REASON_HEADER:-X-Operator-Reason}
    ports:
      - "8050:80"
    depends_on:
      rag-service:
        condition: service_healthy
      knowledge-service:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-smartcloud}
      MYSQL_USER: ${MYSQL_USER:-smartcloud}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-smartcloud}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-smartcloud-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  mongo:
    image: mongo:7
    command: ["mongod", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-lc",
          "exec 3<>/dev/tcp/127.0.0.1/6333 && printf 'GET /collections HTTP/1.1\\r\\nHost: 127.0.0.1\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '\"status\":\"ok\"' <&3",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: ${OPENSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-Smartcloud123!}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-lc",
          "curl -fsS http://127.0.0.1:9200/_cluster/health | grep -Eq '\"status\":\"(green|yellow)\"'",
        ]
      interval: 20s
      timeout: 10s
      retries: 15
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-smartcloud}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-smartcloud123}
    ports:
      - "${SMARTCLOUD_MINIO_HOST_PORT:-19000}:9000"
      - "${SMARTCLOUD_MINIO_CONSOLE_HOST_PORT:-19001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    volumes:
      - ../../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      knowledge-service:
        condition: service_healthy
      rag-service:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:latest
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "3000:3000"
    volumes:
      - ../../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped

volumes:
  gateway_runtime:
  knowledge_runtime:
  prometheus_data:
  grafana_data:
  mongo_data:
  qdrant_data:
  minio_data:
  mysql_data:
  opensearch_data:
