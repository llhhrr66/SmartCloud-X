services:
  auth-user-service:
    build:
      context: ../../apps/auth-user-service
      dockerfile: Dockerfile
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8001"]
    environment:
      SMARTCLOUD_LOG_LEVEL: ${SMARTCLOUD_LOG_LEVEL:-INFO}
      SMARTCLOUD_CORS_ALLOWED_ORIGINS: ${SMARTCLOUD_CORS_ALLOWED_ORIGINS:-http://localhost:8050,http://127.0.0.1:8050,http://localhost:5173,http://127.0.0.1:5173,http://localhost:3100,http://127.0.0.1:3100}
      SMARTCLOUD_MYSQL_DSN: ${SMARTCLOUD_MYSQL_DSN:-mysql+pymysql://smartcloud:smartcloud@mysql:3306/smartcloud}
      AUTH_USER_SERVICE_DATABASE_URL: ${AUTH_USER_SERVICE_DATABASE_URL:-mysql+pymysql://smartcloud:smartcloud@mysql:3306/smartcloud}
      SMARTCLOUD_JWT_SECRET: ${SMARTCLOUD_JWT_SECRET:-replace-me}
      ALLOWED_INTERNAL_CALLERS: ${AUTH_ALLOWED_INTERNAL_CALLERS:-gateway-service,marketing-service,research-service}
    ports:
      - "8001:8001"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import json, urllib.request; payload=json.load(urllib.request.urlopen('http://127.0.0.1:8001/readyz')); raise SystemExit(0 if payload.get('status') == 'ready' else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  marketing-service:
    build:
      context: ../../apps/marketing-service
      dockerfile: Dockerfile
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8002"]
    environment:
      SMARTCLOUD_LOG_LEVEL: ${SMARTCLOUD_LOG_LEVEL:-INFO}
      SMARTCLOUD_CORS_ALLOWED_ORIGINS: ${SMARTCLOUD_CORS_ALLOWED_ORIGINS:-http://localhost:8050,http://127.0.0.1:8050,http://localhost:5173,http://127.0.0.1:5173,http://localhost:3100,http://127.0.0.1:3100}
      SMARTCLOUD_MYSQL_DSN: ${SMARTCLOUD_MYSQL_DSN:-mysql+pymysql://smartcloud:smartcloud@mysql:3306/smartcloud}
      SMARTCLOUD_MONGODB_URI: ${SMARTCLOUD_MONGODB_URI:-mongodb://mongo:27017}
      SMARTCLOUD_MONGODB_DATABASE: ${SMARTCLOUD_MONGODB_DATABASE:-smartcloud}
      MARKETING_SERVICE_DATABASE_URL: ${MARKETING_SERVICE_DATABASE_URL:-mysql+pymysql://smartcloud:smartcloud@mysql:3306/smartcloud}
      SMARTCLOUD_JWT_SECRET: ${SMARTCLOUD_JWT_SECRET:-replace-me}
      MARKETING_SERVICE_AUTH_VALIDATE_TOKEN_URL: ${MARKETING_SERVICE_AUTH_VALIDATE_TOKEN_URL:-http://auth-user-service:8001/internal/v1/auth/validate-token}
      MARKETING_SERVICE_AUTH_VALIDATION_MODE: ${MARKETING_SERVICE_AUTH_VALIDATION_MODE:-strict}
      SMARTCLOUD_MINIO_ENDPOINT: ${SMARTCLOUD_MINIO_ENDPOINT:-http://minio:9000}
      SMARTCLOUD_MINIO_BUCKET: ${SMARTCLOUD_MINIO_BUCKET:-marketing-artifacts}
      MARKETING_SERVICE_MINIO_BUCKET: ${MARKETING_SERVICE_MINIO_BUCKET:-marketing-artifacts}
      SMARTCLOUD_MINIO_ACCESS_KEY: ${SMARTCLOUD_MINIO_ACCESS_KEY:-smartcloud}
      SMARTCLOUD_MINIO_SECRET_KEY: ${SMARTCLOUD_MINIO_SECRET_KEY:-smartcloud123}
      MARKETING_SERVICE_POSTER_PUBLIC_BASE_URL: ${MARKETING_SERVICE_POSTER_PUBLIC_BASE_URL:-http://localhost:19000/marketing-artifacts}
      SMARTCLOUD_REDIS_URL: ${SMARTCLOUD_REDIS_URL:-redis://redis:6379/0}
      MARKETING_SERVICE_CELERY_BROKER_URL: ${MARKETING_SERVICE_CELERY_BROKER_URL:-redis://redis:6379/0}
      MARKETING_SERVICE_CELERY_RESULT_BACKEND: ${MARKETING_SERVICE_CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      MARKETING_SERVICE_CELERY_QUEUE: ${MARKETING_SERVICE_CELERY_QUEUE:-marketing.poster}
      MARKETING_POSTER_GENERATOR_PROVIDER: ${MARKETING_POSTER_GENERATOR_PROVIDER:-openai-image}
      MARKETING_IMAGE_API_URL: ${MARKETING_IMAGE_API_URL:-https://91vip.futureppo.top}
      MARKETING_IMAGE_API_KEY: ${MARKETING_IMAGE_API_KEY:-sk-1nZMOsdnKrRFnsYMaeLc8GIgxPd9RZLEv5YXASrUzEZxP0sr}
      MARKETING_IMAGE_MODEL: ${MARKETING_IMAGE_MODEL:-gpt-image-2}
      MARKETING_SERVICE_CELERY_SOFT_TIME_LIMIT_SECONDS: ${MARKETING_SERVICE_CELERY_SOFT_TIME_LIMIT_SECONDS:-120}
      MARKETING_SERVICE_CELERY_TIME_LIMIT_SECONDS: ${MARKETING_SERVICE_CELERY_TIME_LIMIT_SECONDS:-180}
    ports:
      - "8002:8002"
    depends_on:
      auth-user-service:
        condition: service_healthy
      mysql:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import json, urllib.request; payload=json.load(urllib.request.urlopen('http://127.0.0.1:8002/readyz')); raise SystemExit(0 if payload.get('ready') is True or payload.get('status') == 'ready' else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  marketing-worker:
    build:
      context: ../../apps/marketing-service
      dockerfile: Dockerfile
    command: ["celery", "-A", "app.celery_app.celery_app", "worker", "--loglevel=INFO", "--pool=solo", "-Q", "marketing.poster"]
    environment:
      SMARTCLOUD_LOG_LEVEL: ${SMARTCLOUD_LOG_LEVEL:-INFO}
      SMARTCLOUD_MYSQL_DSN: ${SMARTCLOUD_MYSQL_DSN:-mysql+pymysql://smartcloud:smartcloud@mysql:3306/smartcloud}
      SMARTCLOUD_MONGODB_URI: ${SMARTCLOUD_MONGODB_URI:-mongodb://mongo:27017}
      SMARTCLOUD_MONGODB_DATABASE: ${SMARTCLOUD_MONGODB_DATABASE:-smartcloud}
      SMARTCLOUD_MINIO_ENDPOINT: ${SMARTCLOUD_MINIO_ENDPOINT:-http://minio:9000}
      SMARTCLOUD_MINIO_BUCKET: ${SMARTCLOUD_MINIO_BUCKET:-marketing-artifacts}
      MARKETING_SERVICE_MINIO_BUCKET: ${MARKETING_SERVICE_MINIO_BUCKET:-marketing-artifacts}
      SMARTCLOUD_MINIO_ACCESS_KEY: ${SMARTCLOUD_MINIO_ACCESS_KEY:-smartcloud}
      SMARTCLOUD_MINIO_SECRET_KEY: ${SMARTCLOUD_MINIO_SECRET_KEY:-smartcloud123}
      MARKETING_SERVICE_POSTER_PUBLIC_BASE_URL: ${MARKETING_SERVICE_POSTER_PUBLIC_BASE_URL:-http://localhost:19000/marketing-artifacts}
      SMARTCLOUD_REDIS_URL: ${SMARTCLOUD_REDIS_URL:-redis://redis:6379/0}
      MARKETING_SERVICE_CELERY_BROKER_URL: ${MARKETING_SERVICE_CELERY_BROKER_URL:-redis://redis:6379/0}
      MARKETING_SERVICE_CELERY_RESULT_BACKEND: ${MARKETING_SERVICE_CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      MARKETING_SERVICE_CELERY_QUEUE: ${MARKETING_SERVICE_CELERY_QUEUE:-marketing.poster}
      MARKETING_POSTER_GENERATOR_PROVIDER: ${MARKETING_POSTER_GENERATOR_PROVIDER:-openai-image}
      MARKETING_IMAGE_API_URL: ${MARKETING_IMAGE_API_URL:-https://91vip.futureppo.top}
      MARKETING_IMAGE_API_KEY: ${MARKETING_IMAGE_API_KEY:-sk-1nZMOsdnKrRFnsYMaeLc8GIgxPd9RZLEv5YXASrUzEZxP0sr}
      MARKETING_IMAGE_MODEL: ${MARKETING_IMAGE_MODEL:-gpt-image-2}
      MARKETING_SERVICE_CELERY_SOFT_TIME_LIMIT_SECONDS: ${MARKETING_SERVICE_CELERY_SOFT_TIME_LIMIT_SECONDS:-120}
      MARKETING_SERVICE_CELERY_TIME_LIMIT_SECONDS: ${MARKETING_SERVICE_CELERY_TIME_LIMIT_SECONDS:-180}
    depends_on:
      marketing-service:
        condition: service_healthy
      mysql:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  research-service:
    build:
      context: ../../apps/research-service
      dockerfile: Dockerfile
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8003"]
    environment:
      SMARTCLOUD_LOG_LEVEL: ${SMARTCLOUD_LOG_LEVEL:-INFO}
      SMARTCLOUD_CORS_ALLOWED_ORIGINS: ${SMARTCLOUD_CORS_ALLOWED_ORIGINS:-http://localhost:8050,http://127.0.0.1:8050,http://localhost:5173,http://127.0.0.1:5173,http://localhost:3100,http://127.0.0.1:3100}
      SMARTCLOUD_MYSQL_DSN: ${SMARTCLOUD_MYSQL_DSN:-mysql+pymysql://smartcloud:smartcloud@mysql:3306/smartcloud}
      SMARTCLOUD_MONGODB_URI: ${SMARTCLOUD_MONGODB_URI:-mongodb://mongo:27017}
      SMARTCLOUD_MONGODB_DATABASE: ${SMARTCLOUD_MONGODB_DATABASE:-smartcloud}
      RESEARCH_SERVICE_DATABASE_URL: ${RESEARCH_SERVICE_DATABASE_URL:-mysql+pymysql://smartcloud:smartcloud@mysql:3306/smartcloud}
      SMARTCLOUD_JWT_SECRET: ${SMARTCLOUD_JWT_SECRET:-replace-me}
      RESEARCH_SERVICE_AUTH_VALIDATE_TOKEN_URL: ${RESEARCH_SERVICE_AUTH_VALIDATE_TOKEN_URL:-http://auth-user-service:8001/internal/v1/auth/validate-token}
      RESEARCH_SERVICE_AUTH_VALIDATION_MODE: ${RESEARCH_SERVICE_AUTH_VALIDATION_MODE:-strict}
      RESEARCH_AGENT_PROVIDER: ${RESEARCH_AGENT_PROVIDER:-pipeline}
      RESEARCH_EXTERNAL_SEARCH_PROVIDER: ${RESEARCH_EXTERNAL_SEARCH_PROVIDER:-disabled}
      OTEL_SERVICE_NAME: smartcloud-x-research-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://phoenix:4317}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-grpc}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-smartcloud-x-local}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
    ports:
      - "8003:8003"
    depends_on:
      auth-user-service:
        condition: service_healthy
      mysql:
        condition: service_healthy
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import json, urllib.request; payload=json.load(urllib.request.urlopen('http://127.0.0.1:8003/readyz')); raise SystemExit(0 if payload.get('ready') is True or payload.get('status') == 'ready' else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  business-tools-service:
    build:
      context: ../../apps/business-tools
      dockerfile: Dockerfile
    environment:
      SMARTCLOUD_LOG_LEVEL: ${SMARTCLOUD_LOG_LEVEL:-INFO}
      SMARTCLOUD_REDIS_URL: ${SMARTCLOUD_REDIS_URL:-redis://redis:6379/2}
      SMARTCLOUD_MYSQL_DSN: ${SMARTCLOUD_MYSQL_DSN:-mysql+pymysql://smartcloud:smartcloud@mysql:3306/smartcloud?charset=utf8mb4}
      ALLOWED_INTERNAL_CALLERS: ${BUSINESS_TOOLS_ALLOWED_INTERNAL_CALLERS:-tool-hub-service,gateway-service}
    ports:
      - "8030:8030"
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; raise SystemExit(0 if urllib.request.urlopen('http://127.0.0.1:8030/readyz').status == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  tool-hub-service:
    build:
      context: ../../
      dockerfile: apps/tool-hub-service/Dockerfile
    environment:
      SMARTCLOUD_LOG_LEVEL: ${SMARTCLOUD_LOG_LEVEL:-INFO}
      SMARTCLOUD_MYSQL_DSN: ${SMARTCLOUD_MYSQL_DSN:-mysql+pymysql://smartcloud:smartcloud@mysql:3306/smartcloud}
      SMARTCLOUD_REDIS_URL: ${SMARTCLOUD_REDIS_URL:-redis://redis:6379/3}
      BUSINESS_TOOLS_TRANSPORT: ${BUSINESS_TOOLS_TRANSPORT:-http}
      BUSINESS_TOOLS_URL: ${BUSINESS_TOOLS_URL:-http://business-tools-service:8030}
      BUSINESS_TOOLS_INTERNAL_API_PREFIX: ${BUSINESS_TOOLS_INTERNAL_API_PREFIX:-/internal/v1}
      ALLOWED_INTERNAL_CALLERS: ${TOOL_HUB_ALLOWED_INTERNAL_CALLERS:-gateway-service,orchestrator-service}
    ports:
      - "8020:8020"
    depends_on:
      business-tools-service:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; raise SystemExit(0 if urllib.request.urlopen('http://127.0.0.1:8020/readyz').status == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  orchestrator-service:
    build:
      context: ../../
      dockerfile: apps/orchestrator-service/Dockerfile
    environment:
      SMARTCLOUD_LOG_LEVEL: ${SMARTCLOUD_LOG_LEVEL:-INFO}
      SMARTCLOUD_MYSQL_DSN: ${SMARTCLOUD_MYSQL_DSN:-mysql+pymysql://smartcloud:smartcloud@mysql:3306/smartcloud}
      SMARTCLOUD_MONGODB_URI: ${SMARTCLOUD_MONGODB_URI:-mongodb://mongo:27017}
      SMARTCLOUD_MONGODB_DATABASE: ${SMARTCLOUD_MONGODB_DATABASE:-smartcloud}
      SMARTCLOUD_REDIS_URL: ${SMARTCLOUD_REDIS_URL:-redis://redis:6379/4}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-smartcloud-x}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      OTEL_SERVICE_NAME: smartcloud-x-orchestrator-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://phoenix:4317}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-grpc}
      TOOL_HUB_TRANSPORT: ${TOOL_HUB_TRANSPORT:-http}
      MCP_GATEWAY_URL: ${MCP_GATEWAY_URL:-http://tool-hub-service:8020}
      SMARTCLOUD_RAG_SERVICE_BASE_URL: ${SMARTCLOUD_RAG_SERVICE_BASE_URL:-http://rag-service:8040}
      RAG_SERVICE_BASE_URL: ${RAG_SERVICE_BASE_URL:-http://rag-service:8040}
      TOOL_HUB_INTERNAL_API_PREFIX: ${TOOL_HUB_INTERNAL_API_PREFIX:-/internal/v1}
      SMARTCLOUD_LLM_API_KEY: ${SMARTCLOUD_LLM_API_KEY:-}
      SMARTCLOUD_LLM_BASE_URL: ${SMARTCLOUD_LLM_BASE_URL:-}
      SMARTCLOUD_LLM_MODEL: ${SMARTCLOUD_LLM_MODEL:-}
      SMARTCLOUD_LLM_TIMEOUT_SECONDS: ${SMARTCLOUD_LLM_TIMEOUT_SECONDS:-20}
      TOOL_CALL_ENABLED: ${TOOL_CALL_ENABLED:-true}
      MAX_TOOL_CALL_ROUNDS: ${MAX_TOOL_CALL_ROUNDS:-5}
      ALLOWED_INTERNAL_CALLERS: ${ORCHESTRATOR_ALLOWED_INTERNAL_CALLERS:-gateway-service}
    ports:
      - "8010:8010"
    depends_on:
      tool-hub-service:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; raise SystemExit(0 if urllib.request.urlopen('http://127.0.0.1:8010/readyz').status == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  knowledge-service:
    build:
      context: ../../apps/knowledge-service
      dockerfile: Dockerfile
    environment:
      SMARTCLOUD_LOG_LEVEL: ${SMARTCLOUD_LOG_LEVEL:-INFO}
      SMARTCLOUD_TRACE_ENABLED: ${SMARTCLOUD_TRACE_ENABLED:-true}
      SMARTCLOUD_OPERATOR_REASON_HEADER: ${SMARTCLOUD_OPERATOR_REASON_HEADER:-X-Operator-Reason}
      SMARTCLOUD_CORS_ALLOWED_ORIGINS: ${SMARTCLOUD_CORS_ALLOWED_ORIGINS:-http://localhost:8050,http://127.0.0.1:8050,http://localhost:5173,http://127.0.0.1:5173}
