global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: knowledge-service
    metrics_path: /metrics
    static_configs:
      - targets: ["knowledge-service:8030"]

  - job_name: rag-service
    metrics_path: /metrics
    static_configs:
      - targets: ["rag-service:8040"]

  - job_name: orchestrator-service
    metrics_path: /metrics
    static_configs:
      - targets: ["orchestrator-service:8010"]

  - job_name: research-service
    metrics_path: /metrics
    static_configs:
      - targets: ["research-service:8003"]

  - job_name: marketing-service
    metrics_path: /metrics
    static_configs:
      - targets: ["marketing-service:8002"]

  - job_name: tool-hub-service
    metrics_path: /metrics
    static_configs:
      - targets: ["tool-hub-service:8020"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
