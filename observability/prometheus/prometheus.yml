global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: knowledge-service
    metrics_path: /metrics
    static_configs:
      - targets: ["knowledge-service:8030"]

  - job_name: rag-service
    metrics_path: /metrics
    static_configs:
      - targets: ["rag-service:8040"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
