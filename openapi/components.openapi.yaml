  responses:
    ValidationError:
      description: Request headers or payload failed schema validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiEnvelope'
          example:
            success: false
            requestId: req_invalid
            error:
              code: VALIDATION_ERROR
              message: Request validation failed.
              retryable: false
    Unauthorized:
      description: Caller is missing a valid bearer token or shared auth context.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiEnvelope'
          example:
            success: false
            requestId: req_auth
            error:
              code: AUTH_UNAUTHORIZED
              message: Authentication is required for this operation.
              retryable: false
    Forbidden:
      description: Caller is authenticated but missing required service or user context.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiEnvelope'
          example:
            success: false
            requestId: req_forbidden
            error:
              code: ORCH_TOOL_AUTH_REQUIRED
              message: Tool execution requires authenticated execution context.
              retryable: false
    CallerForbidden:
      description: Internal caller is not allowed to use the published internal contract.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiEnvelope'
          example:
            success: false
            requestId: req_internal_forbidden
            error:
              code: ORCH_CALLER_FORBIDDEN
              message: Internal caller is not allowed to access orchestrator chat.
              retryable: false
    ToolHubCallerForbidden:
      description: Internal caller is not allowed to use tool-hub internal aliases or routes.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiEnvelope'
          example:
            success: false
            requestId: req_toolhub_forbidden
            error:
              code: TOOL_HUB_CALLER_FORBIDDEN
              message: Internal caller is not allowed to access tool-hub internal routes.
              retryable: false
    BusinessToolsCallerForbidden:
      description: Internal caller is not allowed to use business-tools internal routes.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiEnvelope'
          example:
            success: false
            requestId: req_business_tools_forbidden
            error:
              code: BUSINESS_TOOLS_CALLER_FORBIDDEN
              message: Internal caller is not allowed to access business-tools routes.
              retryable: false
    ChatConversationArchived:
      description: Conversation is archived and cannot accept new chat completions until restored.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiEnvelope'
          example:
            success: false
            requestId: req_chat_archived
            error:
              code: CHAT_CONVERSATION_ARCHIVED
              message: Conversation is archived and cannot accept new messages.
              retryable: false
    ChatConversationNotFound:
      description: Requested chat conversation does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiEnvelope'
          example:
            success: false
            requestId: req_chat_missing
            error:
              code: CHAT_CONVERSATION_NOT_FOUND
              message: Conversation was not found.
              retryable: false
    ChatConversationRestoreInvalid:
      description: Restore was requested for a conversation that is not archived.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiEnvelope'
          example:
            success: false
            requestId: req_chat_restore_invalid
            error:
              code: CHAT_CONVERSATION_RESTORE_INVALID
              message: Conversation is not archived.
              retryable: false
    ChatMessageNotFound:
      description: Requested chat message or retry target does not exist in the conversation history.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiEnvelope'
          example:
            success: false
            requestId: req_chat_message_missing
            error:
              code: CHAT_MESSAGE_NOT_FOUND
              message: Message was not found in conversation history.
              retryable: false
    ChatContinuationNotAvailable:
      description: Conversation has no pending clarification or confirmation state to continue.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiEnvelope'
          example:
            success: false
            requestId: req_continue_unavailable
            error:
              code: CHAT_CONTINUATION_NOT_AVAILABLE
              message: Conversation has no pending continuation state.
              retryable: false
    ChatMessageNotRunning:
      description: Requested message is not currently running and cannot be cancelled.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiEnvelope'
          example:
            success: false
            requestId: req_cancel_not_running
            error:
              code: CHAT_MESSAGE_NOT_RUNNING
              message: Message is not currently running in the target conversation.
              retryable: false
    ChatConversationRunning:
      description: Conversation already has an active running message and cannot start a second turn yet.
      content:
        application/json:
