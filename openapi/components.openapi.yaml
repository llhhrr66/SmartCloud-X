openapi: 3.1.0
info:
  title: SmartCloud-X Shared OpenAPI Components
  version: 0.10.0
  description: Foundation-owned shared parameters, headers, responses, and schema references.
x-owner-service: supervisor-foundation
paths: {}
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    XRequestIdHeader:
      name: X-Request-Id
      in: header
      required: false
      description: Correlation identifier propagated across services.
      schema:
        type: string
        minLength: 1
    XTraceIdHeader:
      name: X-Trace-Id
      in: header
      required: false
      description: End-to-end trace identifier for observability.
      schema:
        type: string
        minLength: 1
    XConversationIdHeader:
      name: X-Conversation-Id
      in: header
      required: false
      description: Conversation identifier for chat-style flows.
      schema:
        type: string
        minLength: 1
    XCallerServiceHeader:
      name: X-Caller-Service
      in: header
      required: false
      description: Internal caller service identity.
      schema:
        type: string
        minLength: 1
    XTenantIdHeader:
      name: X-Tenant-Id
      in: header
      required: false
      description: Multi-tenant subject or request partition identifier.
      schema:
        type: string
        minLength: 1
    XToolCallIdHeader:
      name: X-Tool-Call-Id
      in: header
      required: false
      description: Stable tool-call identifier propagated across tool-hub and business-tools hops.
      schema:
        type: string
        minLength: 1
    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: false
      description: Client-supplied idempotency token for write actions.
      schema:
        type: string
        minLength: 1
    XOperatorReasonHeader:
      name: X-Operator-Reason
      in: header
      required: false
      description: Short operator-supplied reason recorded in the admin audit log baseline.
      schema:
        type: string
        minLength: 3
        maxLength: 500
    XOperatorReasonRequiredHeader:
      name: X-Operator-Reason
      in: header
      required: true
      description: Short operator-supplied reason recorded in the admin audit log baseline.
      schema:
        type: string
        minLength: 3
        maxLength: 500
    PageQuery:
      name: page
      in: query
      required: false
      description: 1-based page number for offset pagination.
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeQuery:
      name: page_size
      in: query
      required: false
      description: Number of items per page. Maximum 100.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    SortByQuery:
      name: sort_by
      in: query
      required: false
      description: Stable sort field for list retrieval.
      schema:
        type: string
        minLength: 1
    SortOrderQuery:
      name: sort_order
      in: query
      required: false
      description: Sort direction for list retrieval.
      schema:
        type: string
        enum: [asc, desc]
  headers:
    XRequestId:
      description: Correlation identifier assigned to the request.
      schema:
        type: string
        minLength: 1
    XTraceId:
      description: Trace identifier emitted in the response.
      schema:
        type: string
        minLength: 1
    XAppName:
      description: Service name that generated the response.
      schema:
        type: string
        minLength: 1
    XAppVersion:
      description: Service version that generated the response.
      schema:
        type: string
        minLength: 1
    XResponseTime:
      description: End-to-end response time emitted by the service middleware.
      schema:
        type: string
        minLength: 1
